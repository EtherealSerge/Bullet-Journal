<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Bullet Journal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    <header class="app-header">
      <h1>📓 Bullet Journal</h1>
      <button id="sync-btn" class="sync-button" disabled>🔄 Sync with Google Drive</button>
    </header>

    <div class="layout-grid">
      <!-- Left Panel: Calendar & Monthly Tasks -->
      <main class="panel">
        <div class="calendar-controls">
          <button id="prev-month" aria-label="Previous Month">&lt;</button>
          <h2 id="month-year-display"></h2>
          <button id="next-month" aria-label="Next Month">&gt;</button>
        </div>

        <!-- Desktop Weekday Bar (hidden on small screens) -->
        <div class="calendar-weekdays">
          <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>

        <div id="calendar-grid" class="calendar-grid"></div>

        <hr class="section-divider">

        <h3>Monthly Overview</h3>
        <form id="monthly-form" class="task-form">
          <input type="text" id="monthly-input" placeholder="New monthly task or goal..." required autocomplete="off">
          <button type="submit">Add Task</button>
        </form>
        <ul id="monthly-list" class="task-list"></ul>
      </main>

      <!-- Right Panel: Daily Rapid Logging -->
      <aside class="panel">
        <h2 id="selected-date-display">Select a Date</h2>
        <p class="panel-subtitle">Daily Log</p>

        <form id="daily-form" class="task-form">
          <input type="text" id="daily-input" placeholder="New daily entry..." required autocomplete="off">
          <button type="submit">Add Entry</button>
        </form>

        <div class="symbol-legend">
          <span><strong class="symbol">•</strong> Task</span>
          <span><strong class="symbol">✓</strong> Done</span>
          <span><strong class="symbol">&gt;</strong> Migrated</span>
          <span><strong class="symbol">–</strong> Note</span>
        </div>

        <ul id="daily-list" class="task-list"></ul>
      </aside>
    </div>
  </div>

  <!-- Google Identity Services Library -->
  <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
  <script src="script.js"></script>
</body>
</html>
