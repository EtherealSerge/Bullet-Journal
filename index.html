<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Bullet Journal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    <!-- Header with Title and Google Drive Sync Control -->
    <header class="app-header">
      <h1>📓 Bullet Journal</h1>
      <button id="sync-btn" class="sync-button" disabled>🔄 Sync with Google Drive</button>
    </header>

    <div class="layout-grid">
      <!-- Left Panel: Interactive Calendar, Monthly Tasks & At-a-Glance Events -->
      <main class="panel">
        <div class="calendar-controls">
          <button id="prev-month" aria-label="Previous Month">&lt;</button>
          <button id="today-cal-btn" class="today-btn">Today</button>
          <h2 id="month-year-display"></h2>
          <button id="next-month" aria-label="Next Month">&gt;</button>
        </div>

        <!-- Desktop Weekday Bar -->
        <div class="calendar-weekdays">
          <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>

        <!-- Dynamic Grid Populated by JavaScript -->
        <div id="calendar-grid" class="calendar-grid"></div>

        <hr class="section-divider">

        <!-- Monthly Goals & Tasks -->
        <h3>Monthly Overview</h3>
        <form id="monthly-form" class="task-form">
          <textarea id="monthly-input" rows="1" placeholder="New monthly task or goal..." required autocomplete="off"></textarea>
          <button type="submit">Add Task</button>
        </form>
        <ul id="monthly-list" class="task-list"></ul>

        <hr class="section-divider">

        <!-- Monthly Events At-a-Glance -->
        <h3>📅 Monthly Events At-a-Glance</h3>
        <form id="glance-form" class="task-form">
          <select id="glance-day-select" class="glance-select" aria-label="Select Day">
            <!-- Dynamically populated 1 to 28/30/31 -->
          </select>
          <textarea id="glance-input" rows="1" placeholder="New event title..." required autocomplete="off"></textarea>
          <button type="submit">Add Event</button>
        </form>
        <ul id="glance-list" class="task-list"></ul>
      </main>

      <!-- Right Panel: Daily Rapid Logging & Symbol Legend -->
      <aside class="panel">
        <!-- Daily Navigation Controls with Today Button -->
        <div class="daily-controls">
          <button id="prev-day" aria-label="Previous Day">&lt;</button>
          <button id="today-daily-btn" class="today-btn">Today</button>
          <h2 id="selected-date-display">Select a Date</h2>
          <button id="next-day" aria-label="Next Day">&gt;</button>
        </div>
        <p class="panel-subtitle">Daily Log</p>

        <form id="daily-form" class="task-form">
          <textarea id="daily-input" rows="1" placeholder="New daily entry..." required autocomplete="off"></textarea>
          <button type="submit">Add Entry</button>
        </form>

        <!-- Rapid Logging Notation Legend -->
        <div class="symbol-legend">
          <span><strong class="symbol">•</strong> Task</span>
          <span><strong class="symbol">✓</strong> Done</span>
          <span><strong class="symbol">&gt;</strong> Migrated</span>
          <span><strong class="symbol">–</strong> Note</span>
          <span><strong class="symbol">○</strong> Event</span>
        </div>

        <ul id="daily-list" class="task-list"></ul>
      </aside>
    </div>
  </div>

  <!-- Google Identity Services Library -->
  <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
  <script src="script.js"></script>
</body>
</html>
